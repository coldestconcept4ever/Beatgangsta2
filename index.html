        /* Initial Loader Styles */

            align-items: center;
            background-color: #0a0a0a;
            z-index: 9999;
            transition: opacity 0.5s ease;

            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {

        }
